name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ./src/MinimalApi/MinimalApi.csproj

      - name: Build
        run: dotnet build ./src/MinimalApi/MinimalApi.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test ./src/ --no-build --configuration Release --verbosity normal

      - name: Publish
        run: dotnet publish ./src/MinimalApi/MinimalApi.csproj --no-build --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ./publish

  staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    permissions: {}
    environment:
      name: Staging
      url: ${{ steps.deploy-staging.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App - Staging slot
        id: deploy-staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          slot-name: staging
          package: ./publish

  production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: staging
    permissions: {}
    environment:
      name: Production
      url: ${{ steps.deploy-production.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App - Production slot
        id: deploy-production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ./publish
