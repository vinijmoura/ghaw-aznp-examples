name: Build and Deploy

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      data-env: 
        required: false
        type: string
env:
  RELEASE_LABEL: ${{ github.sha }}
  APP_NAME: ${{ github.event.repository.name }}
  DD_LIB_DOTNET_VERSION: "3.34.0"
  DD_LIB_RB_VERSION: "2.23.0"
  DD_LIB_JAVA_VERSION: "1.57.0"
  DD_LIB_PY_VERSION: "4.1.0"
  DD_LIB_PHP_VERSION: "1.11.0"
  DD_LIB_JS_VERSION: "5.81.0"

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    name: Validate Environment
    runs-on: vitat-${{ inputs.environment }}
    outputs:
      namespace: ${{ steps.set-namespace.outputs.namespace }}
      detected_language: ${{ steps.detect-language.outputs.language }}
      type_repo: ${{ steps.detect-language.outputs.typeRepo }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Detect Repo Language
        uses: sejavitat/shared-workflows/.github/actions/detect-language@datadog-envs
        id: detect-language
        with:
          app_name: ${{ env.APP_NAME }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log Detected
        run: echo "The primary language of the repository is ${{ steps.detect-language.outputs.language }} and it is a ${{ steps.detect-language.outputs.typeRepo }} repository."

      - name: Set Namespace Variable
        id: set-namespace
        run: |
          if [[ "${{ env.APP_NAME }}" != ai-* && "${{ env.APP_NAME }}" != "event-data-api" ]]; then
            echo "namespace=vitat-apps" >> $GITHUB_OUTPUT
            echo "NAME_SPACE=vitat-apps" >> $GITHUB_ENV
          elif [[ "${{ env.APP_NAME }}" == ai-* && "${{ inputs.environment }}" == "prod" ]]; then
            echo "namespace=vitat-ai" >> $GITHUB_OUTPUT
            echo "NAME_SPACE=vitat-ai" >> $GITHUB_ENV
          elif [[ "${{ inputs.data-env }}" != "" ]]; then
            echo "Input data-env is set to: ${{ inputs.data-env }}"
            echo "namespace=${{ inputs.data-env }}" >> $GITHUB_OUTPUT
            echo "NAME_SPACE=${{ inputs.data-env }}" >> $GITHUB_ENV
          else
            echo "namespace=dev" >> $GITHUB_OUTPUT
            echo "NAME_SPACE=dev" >> $GITHUB_ENV
          fi

      - name: Set Environment Secrets
        id: set-environment-secrets
        run: |
          echo "Selected environment: ${{ inputs.environment }}"
          if [ "${{ inputs.environment }}" = "dev" ]; then
            echo "AWS_REGION=${{ secrets.DEV_AWS_REGION }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_ARN=${{ secrets.DEV_AWS_CLUSTER_ROLE_ARN }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_SESSION_NAME=${{ secrets.DEV_AWS_CLUSTER_ROLE_SESSION_NAME }}" >> $GITHUB_ENV
          elif [ "${{ inputs.environment }}" = "prod" ]; then
            echo "AWS_REGION=${{ secrets.PROD_AWS_REGION }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_ARN=${{ secrets.PROD_AWS_CLUSTER_ROLE_ARN }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_SESSION_NAME=${{ secrets.PROD_AWS_CLUSTER_ROLE_SESSION_NAME }}" >> $GITHUB_ENV
          elif [ "${{ inputs.environment }}" = "data" ]; then
            echo "AWS_REGION=${{ secrets.DATA_AWS_REGION }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_ARN=${{ secrets.DATA_AWS_CLUSTER_ROLE_ARN }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_SESSION_NAME=${{ secrets.DATA_AWS_CLUSTER_ROLE_SESSION_NAME }}" >> $GITHUB_ENV
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ env.AWS_CLUSTER_ROLE_ARN }}
          role-session-name: ${{ env.AWS_CLUSTER_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Latest Helm Version
        id: get-helm-version
        run: |
          # Faz a requisição para obter a versão estável do Helm
          HELM_VERSION=$(curl -fsSL https://get.helm.sh/helm-latest-version)
          echo "HELM_VERSION=$HELM_VERSION" >> $GITHUB_ENV
          echo "Helm version fetched: $HELM_VERSION"
  
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repo
        run: |
          helm repo add vitat-chart http://chartmuseum-private:8080 \
            --username vitat-admin \
            --password ${{ secrets.HELM_REPO_PASSWORD }}
          helm repo update

      - name: Version Identifier
        run: |
          echo "ENVIRONMENT: ${{ inputs.ENVIRONMENT }}"
          if [ "${{ inputs.environment }}" = "dev" ] || [ "${{ inputs.environment }}" = "data" ]; then
            echo "RUN_IDENTIFIER=${{ github.run_number }}" >> $GITHUB_ENV
            echo "RUN_IDENTIFIER set to: ${{ github.run_number }}"
          elif [ "${{ inputs.environment }}" = "prod" ]; then
            echo "RUN_IDENTIFIER=${{ github.ref_name }}" >> $GITHUB_ENV
            echo "RUN_IDENTIFIER set to: ${{ github.ref_name }}"
          fi

      - name: Validate Helm Chart
        run: |
          echo "🔍 Validating Helm Chart vitat-chart"
          if [[ "${{ inputs.data-env }}" != "" ]]; then
            echo "Using data-env: ${{ inputs.data-env }} for Helm validation"
            helm template ${{ env.APP_NAME }} vitat-chart/vitat-chart --version 1.0.97 -f ./k8s/${{ inputs.data-env }}.yaml \
              --namespace ${{ env.NAME_SPACE }} \
              --set environment=${{ inputs.ENVIRONMENT }} \
              --set language.tag=${{ steps.detect-language.outputs.language }} \
              --set language.java.version=${{ env.DD_LIB_JAVA_VERSION }} \
              --set language.python.version=${{ env.DD_LIB_PY_VERSION }} \
              --set language.javascript.version=${{ env.DD_LIB_JS_VERSION }} \
              --set language.php.version=${{ env.DD_LIB_PHP_VERSION }} \
              --set language.dotnet.version=${{ env.DD_LIB_DOTNET_VERSION }} \
              --set language.ruby.version=${{ env.DD_LIB_RB_VERSION }} \
              --set github.run.number=${{ env.RUN_IDENTIFIER }}
          else
            echo "Using environment ${{ inputs.ENVIRONMENT }} config for Helm validation"
            helm template ${{ env.APP_NAME }} vitat-chart/vitat-chart --version 1.0.97 -f ./k8s/${{ inputs.ENVIRONMENT }}.yaml \
              --namespace ${{ env.NAME_SPACE }} \
              --set environment=${{ inputs.ENVIRONMENT }} \
              --set language.tag=${{ steps.detect-language.outputs.language }} \
              --set language.java.version=${{ env.DD_LIB_JAVA_VERSION }} \
              --set language.python.version=${{ env.DD_LIB_PY_VERSION }} \
              --set language.javascript.version=${{ env.DD_LIB_JS_VERSION }} \
              --set language.php.version=${{ env.DD_LIB_PHP_VERSION }} \
              --set language.dotnet.version=${{ env.DD_LIB_DOTNET_VERSION }} \
              --set language.ruby.version=${{ env.DD_LIB_RB_VERSION }} \
              --set github.run.number=${{ env.RUN_IDENTIFIER }}
          fi

  buildAndDeploy:
    if: ${{ inputs.environment == 'dev' || inputs.environment == 'data' }}
    name: Build image and push to registry ${{ inputs.environment }}
    needs: validate
    runs-on: ${{ inputs.environment == 'data' && 'vitat-data' || 'ubuntu-latest' }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Validate Environment
        run: |
          echo "Selected environment: ${{ inputs.environment }}"
          if [[ "${{ inputs.environment }}" != "dev" && "${{ inputs.environment }}" != "prod" && "${{ inputs.environment }}" != "data" ]]; then
            echo "Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi

      - name: Build, tag, and push image to Github Container Registry
        run: |
          echo ${{ secrets.REGISTRY_TOKEN }} | docker login ghcr.io -u vitat --password-stdin
          docker build . -t ${{ env.APP_NAME }}
          docker tag ${{ env.APP_NAME }} ghcr.io/sejavitat/${{ env.APP_NAME }}:${{ env.RELEASE_LABEL }}
          docker push ghcr.io/sejavitat/${{ env.APP_NAME }}:${{ env.RELEASE_LABEL }}

  deployProd:
    if: ${{ inputs.environment == 'prod' }}
    name: Build image and push to registry ${{ inputs.environment }}
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3
      - name: Validate Environment
        run: |
          echo "Selected environment: ${{ inputs.environment }}"
          if [[ "${{ inputs.environment }}" != "dev" && "${{ inputs.environment }}" != "prod" && "${{ inputs.environment }}" != "data" ]]; then
            echo "Invalid environment: ${{ inputs.environment }}"
            exit 1
          fi
      - name: Build, tag, and push image to Github Container Registry
        run: |
          echo ${{ secrets.REGISTRY_TOKEN }} | docker login ghcr.io -u vitat --password-stdin
  package:
    name: Package And Deploy With Helm ${{ inputs.environment }}
    needs: [validate, buildAndDeploy, deployProd]
    if: >
      always() &&
      needs.validate.result == 'success' &&
      (
        (needs.buildAndDeploy.result == 'success') ||
        (needs.deployProd.result == 'success')
      )
    runs-on: vitat-${{ inputs.environment }}
    steps:
      - name: Check out code
        uses: actions/checkout@v3
      - name: Set Environment Secrets
        id: set-environment-secrets
        run: |
          echo "Selected environment: ${{ inputs.environment }}"
          if [ "${{ inputs.environment }}" = "dev" ]; then
            echo "AWS_REGION=${{ secrets.DEV_AWS_REGION }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_ARN=${{ secrets.DEV_AWS_CLUSTER_ROLE_ARN }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_SESSION_NAME=${{ secrets.DEV_AWS_CLUSTER_ROLE_SESSION_NAME }}" >> $GITHUB_ENV
          elif [ "${{ inputs.environment }}" = "prod" ]; then
            echo "AWS_REGION=${{ secrets.PROD_AWS_REGION }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_ARN=${{ secrets.PROD_AWS_CLUSTER_ROLE_ARN }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_SESSION_NAME=${{ secrets.PROD_AWS_CLUSTER_ROLE_SESSION_NAME }}" >> $GITHUB_ENV
          elif [ "${{ inputs.environment }}" = "data" ]; then
            echo "AWS_REGION=${{ secrets.DATA_AWS_REGION }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_ARN=${{ secrets.DATA_AWS_CLUSTER_ROLE_ARN }}" >> $GITHUB_ENV
            echo "AWS_CLUSTER_ROLE_SESSION_NAME=${{ secrets.DATA_AWS_CLUSTER_ROLE_SESSION_NAME }}" >> $GITHUB_ENV
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: ${{ env.AWS_CLUSTER_ROLE_ARN }}
          role-session-name: ${{ env.AWS_CLUSTER_ROLE_SESSION_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        run: |
          sudo apt update -y
          sudo curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          sudo unzip awscliv2.zip
          sudo ./aws/install
          sudo curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
          sudo chmod 700 get_helm.sh
          sudo ./get_helm.sh
          aws eks --region ${{ env.AWS_REGION }} update-kubeconfig --name ${{ inputs.ENVIRONMENT }}-eks

      - name: Setup Pre-Deploy
        run: |
          if [ "${{ inputs.environment }}" = "dev" ] || [ "${{ inputs.environment }}" = "data" ]; then
            RUN_IDENTIFIER="${{ github.run_number }}"
          elif [ "${{ inputs.environment }}" = "prod" ]; then
            RUN_IDENTIFIER="${{ github.ref_name }}"
          fi
          echo "RUN_IDENTIFIER=$RUN_IDENTIFIER" >> $GITHUB_ENV
          echo "RUN_IDENTIFIER set to: $RUN_IDENTIFIER"

          if [[ "${{ inputs.data-env }}" != "" ]]; then
            echo "CONFIG_FILES=./k8s/${{ inputs.data-env }}.yaml" >> $GITHUB_ENV
          else
            echo "CONFIG_FILES=./k8s/${{ inputs.environment }}.yaml" >> $GITHUB_ENV
          fi

          echo "HELM_VERSION=1.0.97" >> $GITHUB_ENV
          echo "VALUES=environment=${{ inputs.ENVIRONMENT }},image.repository=ghcr.io/sejavitat/${{ env.APP_NAME }},image.tag=${{ env.RELEASE_LABEL }},language.tag=${{ needs.validate.outputs.detected_language }},language.java.version=${{ env.DD_LIB_JAVA_VERSION }},language.python.version=${{ env.DD_LIB_PY_VERSION }},language.javascript.version=${{ env.DD_LIB_JS_VERSION }},language.php.version=${{ env.DD_LIB_PHP_VERSION }},language.dotnet.version=${{ env.DD_LIB_DOTNET_VERSION }},language.ruby.version=${{ env.DD_LIB_RB_VERSION }},github.run.number=$RUN_IDENTIFIER,typeRepo=${{ needs.validate.outputs.type_repo }}" >> $GITHUB_ENV

          echo "GitHub Run Number: ${{ github.run_number }}"



      - name: Deploy Helm
        id: deploy
        uses: sejavitat/github-actions-deploy-eks-helm@v1
        with:
          cluster-name: ${{ inputs.ENVIRONMENT }}-eks
          config-files: ${{ env.CONFIG_FILES }}
          namespace: ${{ needs.validate.outputs.namespace }}
          name: ${{ env.APP_NAME }}
          chart-repository: http://chartmuseum-private:8080
          chart-path: vitat-chart/vitat-chart
          username: vitat-admin
          password: ${{ secrets.HELM_REPO_PASSWORD }}
          values: ${{ env.VALUES }}
          timeout: 900s
          helm-wait: true
          version: ${{ env.HELM_VERSION }}
        continue-on-error: true

      - name: Rollback if rollout failed
        if: steps.deploy.outcome == 'failure'
        run: |
          echo "❌ Rollout failed. Checking history..."
          echo "ℹ️ Helm history for ${{ env.APP_NAME }} in namespace ${{ needs.validate.outputs.namespace }}:"
          helm history ${{ env.APP_NAME }} -n ${{ needs.validate.outputs.namespace }} || echo "⚠️ No history found for ${{ env.APP_NAME }}."

          if ! helm history ${{ env.APP_NAME }} -n ${{ needs.validate.outputs.namespace }} &> /dev/null; then
            echo "⚠️ The release ${{ env.APP_NAME }} does not exist in the ${{ needs.validate.outputs.namespace }} namespace. Rollback cannot be performed."
            exit 1
          fi

          LAST_SUCCESS=$(helm history ${{ env.APP_NAME }} -n ${{ needs.validate.outputs.namespace }} | grep "deployed" | tail -n 1 | awk '{print $1}')
          if [ -z "$LAST_SUCCESS" ]; then
            echo "⚠️ No previous revision found for rollback."
            exit 1
          fi

          echo "🔙 Rolling back to revision $LAST_SUCCESS..."
          helm rollback ${{ env.APP_NAME }} $LAST_SUCCESS -n ${{ needs.validate.outputs.namespace }}

          echo "✅ Rollback completed successfully. Get more details why the deployment failed by accessing the New Relic."
          echo "ROLLBACK_OCCURRED=true" >> $GITHUB_ENV
          exit 1
        continue-on-error: true

      - name: Fail job if rollback occurred
        if: env.ROLLBACK_OCCURRED == 'true'
        run: |
          echo "❌ Rollback occurred, marking job as failed." | tee -a $GITHUB_STEP_SUMMARY
          exit 1
      - name: DataDog Service
        if: always()
        continue-on-error: true
        run: |
          echo "🔄 Creating DataDog Service to repository ${{ env.APP_NAME }} and ${{ inputs.environment }} environment"
          #Create Summary
          echo "### DataDog Service" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[${{ env.APP_NAME }}](https://app.datadoghq.com/apm/entity/service:${{ env.APP_NAME }}-${{ inputs.environment }}?dependencyMap.showNetworkMetrics=false&env=dev&fromUser=false&graphType=flamegraph&groupMapByOperation=null&shouldShowLegend=true)" >> $GITHUB_STEP_SUMMARY

  analise-image:
    name: Analise Docker Image Vulnerabilities
    needs: [buildAndDeploy]
    runs-on: vitat-${{ inputs.environment }}
    steps:
      - name: Login to GHCR
        run: |
          echo ${{ secrets.REGISTRY_TOKEN }} | docker login ghcr.io -u vitat --password-stdin

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Scout Quickview
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: ghcr.io/sejavitat/${{ env.APP_NAME }}:${{ env.RELEASE_LABEL }}
          only-severities: critical,high
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Scout CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ghcr.io/sejavitat/${{ env.APP_NAME }}:${{ env.RELEASE_LABEL }}
          only-severities: critical,high
          github-token: ${{ secrets.GITHUB_TOKEN }}
